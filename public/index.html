<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Raxion Demo Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --raxion-black: #080c10;
      --raxion-deep: #0d1219;
      --raxion-surface: #111820;
      --raxion-card: #161f2a;
      --raxion-border: #1e2d3d;
      --raxion-border-lit: #2a4060;
      --raxion-blue: #1a6fff;
      --raxion-blue-glow: rgba(26, 111, 255, 0.15);
      --raxion-teal: #00c9a7;
      --raxion-teal-dim: rgba(0, 201, 167, 0.12);
      --raxion-amber: #ffb547;
      --raxion-amber-dim: rgba(255, 181, 71, 0.12);
      --raxion-red: #ff4757;
      --raxion-text-primary: #e8edf2;
      --raxion-text-secondary: #6b8099;
      --raxion-text-muted: #3d5268;
      --raxion-green: #00e676;
      --raxion-green-dim: rgba(0, 230, 118, 0.1);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.35);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius: 20px;
      --radius-sm: 14px;
      --transition: 200ms ease-out;
      --content-max: 1480px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(26, 111, 255, 0.09), transparent 28%),
        radial-gradient(circle at top right, rgba(0, 201, 167, 0.06), transparent 22%),
        linear-gradient(180deg, #0a1016 0%, #080c10 100%);
      color: var(--raxion-text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.45;
      overflow-x: hidden;
    }

    body.drawer-open,
    body.modal-open {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button,
    select,
    input {
      min-height: 44px;
    }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
      background: none;
    }

    .app {
      min-height: 100vh;
      padding-top: 56px;
    }

    .demo-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 70;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 56px;
      padding: 10px 16px;
      background: rgba(8, 12, 16, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .banner-copy {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--raxion-text-secondary);
      min-width: 0;
    }

    .banner-pill {
      flex: 0 0 auto;
      padding: 5px 8px;
      border-radius: 999px;
      color: var(--raxion-blue);
      background: var(--raxion-blue-glow);
      border: 1px solid rgba(26, 111, 255, 0.35);
    }

    .banner-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }

    .sidebar {
      display: none;
    }

    .sidebar-inner,
    .mobile-drawer-panel {
      background: linear-gradient(180deg, rgba(17, 24, 32, 0.98) 0%, rgba(10, 15, 20, 0.98) 100%);
      border-right: 1px solid var(--raxion-border);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 28px;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--raxion-text-primary);
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(26, 111, 255, 0.22), rgba(0, 201, 167, 0.18));
      border: 1px solid rgba(26, 111, 255, 0.3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 18px rgba(26, 111, 255, 0.12);
    }

    .brand-sub {
      font-size: 12px;
      color: var(--raxion-text-secondary);
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      padding: 12px 14px;
      border-left: 3px solid transparent;
      border-radius: 0 14px 14px 0;
      color: var(--raxion-text-secondary);
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }

    .nav-link.active {
      border-left-color: var(--raxion-blue);
      background: var(--raxion-blue-glow);
      color: var(--raxion-text-primary);
    }

    .nav-link svg,
    .bottom-nav-item svg,
    .icon-button svg,
    .empty-state svg,
    .action-link svg,
    .summary-pill svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .sidebar-cta,
    .banner-cta,
    .button-primary,
    .floating-cta,
    .overlay-book {
      background: linear-gradient(180deg, #2b7dff 0%, #1a6fff 100%);
      color: #fff;
      box-shadow: 0 0 20px rgba(26, 111, 255, 0.24);
    }

    .banner-cta,
    .button-secondary,
    .button-primary,
    .ghost-button,
    .inline-button,
    .sidebar-cta,
    .floating-cta,
    .overlay-book,
    .overlay-dismiss,
    .pill-filter {
      min-height: 44px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      transition: transform var(--transition), border-color var(--transition), background var(--transition), color var(--transition), opacity var(--transition);
    }

    .button-primary:hover,
    .banner-cta:hover,
    .floating-cta:hover,
    .overlay-book:hover {
      transform: translateY(-1px);
    }

    .button-secondary,
    .ghost-button,
    .overlay-dismiss,
    .inline-button,
    .pill-filter {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--raxion-border);
      color: var(--raxion-text-primary);
    }

    .main {
      width: 100%;
      min-width: 0;
    }

    .main-inner {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 12px 12px calc(112px + var(--safe-bottom));
    }

    .mobile-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0 14px;
    }

    .mobile-brandline {
      min-width: 0;
    }

    .mobile-brandline h1,
    .page-hero h2,
    .section-title,
    .stat-value,
    .summary-value {
      font-family: 'DM Mono', monospace;
    }

    .mobile-brandline h1 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .mobile-brandline p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--raxion-text-secondary);
    }

    .icon-button {
      width: 44px;
      min-width: 44px;
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid var(--raxion-border);
      background: rgba(255, 255, 255, 0.02);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--raxion-text-primary);
    }

    .page-view {
      display: none;
      animation: fadeUp 420ms ease-out both;
    }

    .page-view.active {
      display: block;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-card,
    .hero-card,
    .feed-card,
    .candidate-card,
    .outreach-card,
    .job-card,
    .overlay-panel,
    .toast,
    .metric-card,
    .stat-card,
    .summary-card {
      background: linear-gradient(180deg, rgba(22, 31, 42, 0.98) 0%, rgba(15, 21, 29, 0.98) 100%);
      border: 1px solid var(--raxion-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
    }

    .hero-card,
    .section-card,
    .feed-card,
    .summary-card {
      padding: 16px;
    }

    .stagger-1 { animation-delay: 80ms; }
    .stagger-2 { animation-delay: 160ms; }
    .stagger-3 { animation-delay: 240ms; }
    .stagger-4 { animation-delay: 320ms; }

    .page-hero {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .page-hero h2 {
      margin: 0;
      font-size: clamp(1.55rem, 6vw, 2.3rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .page-hero p {
      margin: 0;
      color: var(--raxion-text-secondary);
      font-size: 15px;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--raxion-blue);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      padding: 14px;
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(26, 111, 255, 0.08), transparent 55%);
      pointer-events: none;
    }

    .stat-value {
      position: relative;
      z-index: 1;
      font-size: clamp(1.55rem, 6vw, 2.4rem);
      letter-spacing: -0.05em;
      animation: statusPulse 8s infinite;
    }

    .stat-label {
      position: relative;
      z-index: 1;
      color: var(--raxion-text-secondary);
      font-size: 12px;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .section-copy {
      color: var(--raxion-text-secondary);
      margin: 4px 0 0;
      font-size: 13px;
    }

    .inline-actions,
    .quick-actions,
    .summary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .quick-actions .button-primary,
    .quick-actions .button-secondary,
    .summary-actions a,
    .summary-actions button {
      flex: 1 1 180px;
    }

    .button-primary,
    .button-secondary,
    .ghost-button,
    .inline-button,
    .sidebar-cta,
    .floating-cta,
    .overlay-book,
    .overlay-dismiss {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .button-secondary,
    .ghost-button {
      color: var(--raxion-text-secondary);
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--raxion-text-secondary);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field select,
    .search-input {
      width: 100%;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--raxion-border);
      background: rgba(8, 12, 16, 0.75);
      color: var(--raxion-text-primary);
      font-size: 16px;
      outline: none;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--raxion-text-secondary) 50%),
        linear-gradient(135deg, var(--raxion-text-secondary) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 2px),
        calc(100% - 12px) calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }

    .search-input {
      background-image: none;
      padding-right: 14px;
    }

    .feed-state {
      position: relative;
      min-height: 220px;
      overflow: hidden;
    }

    .empty-state,
    .scan-state,
    .candidate-feed {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .empty-state {
      align-items: center;
      justify-content: center;
      min-height: 220px;
      text-align: center;
      color: var(--raxion-text-secondary);
    }

    .empty-radar {
      position: relative;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 1px solid rgba(26, 111, 255, 0.3);
      background: radial-gradient(circle, rgba(26, 111, 255, 0.14) 0%, rgba(26, 111, 255, 0.04) 38%, transparent 70%);
    }

    .empty-radar::before,
    .empty-radar::after {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px solid rgba(26, 111, 255, 0.15);
    }

    .empty-radar::after {
      inset: 28px;
    }

    .scan-line {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .scan-line::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 45%;
      background: linear-gradient(90deg, transparent 0%, rgba(26, 111, 255, 0.85) 50%, transparent 100%);
      animation: scanBar 1.25s linear infinite;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--raxion-text-secondary);
      font-size: 13px;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--raxion-teal);
      box-shadow: 0 0 0 0 rgba(0, 201, 167, 0.4);
      animation: statusPulse 1.8s infinite;
    }

    .progress-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .progress-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: var(--raxion-text-secondary);
    }

    .progress-bar {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .progress-fill,
    .score-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(26, 111, 255, 0.7), rgba(0, 201, 167, 0.92));
      width: 0%;
      animation: scoreFill 900ms ease-out forwards;
      --target-width: 0%;
    }

    .candidate-feed {
      gap: 12px;
    }

    .candidate-card {
      padding: 14px;
      animation: slideInRight 420ms ease-out both;
    }

    .candidate-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: #fff;
      flex: 0 0 auto;
    }

    .candidate-meta {
      min-width: 0;
      flex: 1;
    }

    .candidate-meta h4 {
      margin: 0;
      font-size: 15px;
    }

    .candidate-meta p,
    .candidate-meta span,
    .candidate-sub,
    .summary-copy,
    .activity-item-meta,
    .watermark {
      color: var(--raxion-text-secondary);
    }

    .candidate-meta p,
    .candidate-sub {
      margin: 4px 0 0;
      font-size: 13px;
    }

    .score-block {
      margin-top: 12px;
    }

    .score-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--raxion-text-secondary);
      font-family: 'DM Mono', monospace;
    }

    .score-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .candidate-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .action-link {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid var(--raxion-border);
      background: rgba(255, 255, 255, 0.02);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--raxion-text-primary);
    }

    .summary-bar {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(26, 111, 255, 0.18);
      background: linear-gradient(135deg, rgba(26, 111, 255, 0.14), rgba(0, 201, 167, 0.08));
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    .summary-card {
      padding: 12px;
    }

    .summary-value {
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .summary-copy {
      margin-top: 4px;
      font-size: 12px;
    }

    .activity-list,
    .compact-list,
    .outreach-list,
    .jobs-list,
    .candidate-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .activity-item,
    .compact-item {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .activity-item-top,
    .compact-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .activity-type,
    .badge,
    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge-blue,
    .status-shortlisted {
      color: var(--raxion-blue);
      background: var(--raxion-blue-glow);
      border: 1px solid rgba(26, 111, 255, 0.28);
    }

    .badge-amber,
    .status-outreach {
      color: var(--raxion-amber);
      background: var(--raxion-amber-dim);
      border: 1px solid rgba(255, 181, 71, 0.24);
    }

    .badge-teal,
    .status-replied {
      color: var(--raxion-teal);
      background: var(--raxion-teal-dim);
      border: 1px solid rgba(0, 201, 167, 0.22);
    }

    .badge-green,
    .status-interview {
      color: var(--raxion-green);
      background: var(--raxion-green-dim);
      border: 1px solid rgba(0, 230, 118, 0.2);
    }

    .summary-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.03);
      color: var(--raxion-text-secondary);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .pill-filter.active {
      background: var(--raxion-blue-glow);
      color: var(--raxion-text-primary);
      border-color: rgba(26, 111, 255, 0.3);
    }

    .candidate-line {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .candidate-line-main {
      min-width: 0;
      flex: 1;
    }

    .candidate-line-main h4 {
      margin: 0;
      font-size: 15px;
    }

    .candidate-line-main p {
      margin: 4px 0 0;
      color: var(--raxion-text-secondary);
      font-size: 13px;
    }

    .candidate-line-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .table-shell {
      display: none;
    }

    .outreach-card {
      padding: 16px;
    }

    .outreach-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      align-items: flex-start;
    }

    .outreach-card blockquote {
      margin: 0;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--raxion-text-primary);
      font-size: 14px;
      line-height: 1.6;
    }

    .bottom-nav-item span:last-child {

    .bottom-nav-item.active span:last-child {
      display: inline;
    }

    .mobile-drawer {
      position: fixed;
      inset: 0;
      z-index: 75;
      display: none;
    }

    .mobile-drawer.open {
      display: block;
    }

    .mobile-drawer-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(8, 12, 16, 0.72);
    }

    .mobile-drawer-panel {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(86vw, 320px);
      padding: 18px 16px 22px;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 220ms ease-out;
      box-shadow: var(--shadow-lg);
    }

    .mobile-drawer.open .mobile-drawer-panel {
      transform: translateX(0);
    }

    .drawer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .drawer-bottom {
      margin-top: auto;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .floating-cta {
      position: fixed;
      right: 16px;
      bottom: calc(84px + var(--safe-bottom));
      z-index: 58;
      width: 140px;
      min-height: 48px;
      border-radius: 24px;
      animation: ctaPulse 6s ease-in-out infinite;
    }

    .watermark {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(80px + var(--safe-bottom));
      z-index: 10;
      width: calc(100% - 32px);
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.03em;
      pointer-events: none;
    }

    .overlay-root {
      position: fixed;
      inset: 0;
      z-index: 85;
      pointer-events: none;
    }

    .overlay-shell {
      position: absolute;
      inset: 0;
      background: rgba(8, 12, 16, 0.66);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 16px calc(84px + var(--safe-bottom));
      pointer-events: auto;
    }

    .overlay-panel {
      width: min(100%, 560px);
      padding: 18px;
      border-radius: 22px 22px 0 0;
    }

    .overlay-panel h3 {
      margin: 0 0 8px;
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .overlay-panel p {
      margin: 0 0 14px;
      color: var(--raxion-text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .overlay-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast-root {
      position: fixed;
      right: 12px;
      left: 12px;
      bottom: calc(152px + var(--safe-bottom));
      z-index: 80;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      padding: 14px 16px;
      font-size: 13px;
      color: var(--raxion-text-primary);
      animation: fadeUp 280ms ease-out both;
    }

    .desktop-actions {
      display: none;
    }

    @keyframes slideInRight {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes scanBar {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    @keyframes scoreFill {
      from { width: 0%; }
      to { width: var(--target-width); }
    }

    @keyframes ctaPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(26, 111, 255, 0.4); }
      50% { transform: scale(1.04); box-shadow: 0 0 30px rgba(26, 111, 255, 0.6); }
    }

    @keyframes fadeUp {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (min-width: 768px) {
      .app {
        padding-top: 56px;
      }

      .sidebar {
        display: block;
        width: 220px;
        flex: 0 0 220px;
      }

      .sidebar-inner {
        position: fixed;
        top: 56px;
        bottom: 0;
        left: 0;
        width: 220px;
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
      }

      .main {
        width: calc(100% - 220px);
        margin-left: 220px;
      }

      .main-inner {
        padding: 28px 24px 96px;
      }

      .mobile-topbar,
      .bottom-nav,
      .mobile-drawer {
        display: none !important;
      }

      .desktop-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .stats-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .field-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .overlay-shell {
        align-items: center;
        padding: 24px;
      }

      .overlay-panel {
        border-radius: 22px;
      }

      .toast-root {
        left: auto;
        width: 360px;
        bottom: 24px;
      }

      .floating-cta {
        right: 24px;
        bottom: 24px;
      }

      .watermark {
        left: 24px;
        bottom: 16px;
        transform: none;
        width: auto;
        text-align: left;
      }
    }

    @media (min-width: 1024px) {
      .main-inner {
        padding: 32px 32px 96px;
      }

      .field-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .launch-row {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 16px;
        align-items: start;
      }

      .table-shell {
        display: block;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid var(--raxion-border);
      }

      .table-shell table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.02);
      }

      .table-shell th,
      .table-shell td {
        padding: 14px 16px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .table-shell th {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: var(--raxion-text-secondary);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .mobile-candidates {
        display: none;
      }
    }

    @media (min-width: 1280px) {
      .main-inner {
        padding-left: 40px;
        padding-right: 40px;
      }
    }
  </style>
</head>
<body>

    <div class="mobile-drawer-panel">
      <div class="drawer-top">
        <div class="brand">
          <div class="brand-mark">
            <span class="brand-logo">R</span>

          </div>
          <div class="brand-sub"><span data-firm-name>Your Agency</span></div>

      <nav class="nav-list" id="mobile-nav"></nav>

  <div class="watermark" id="watermark"></div>
  <div class="toast-root" id="toast-root"></div>
  <div class="overlay-root" id="overlay-root"></div>

  <script>
    (function () {
      const BOOKING_URL = 'https://calendly.com/libdr/raxion-demo';
      const PAGE_STORAGE_KEY = 'raxion-active-page';
      const OVERLAY_STORAGE_KEY = 'raxion-overlay-shown';
      const SESSION_TRACK_KEY = 'raxion-session-id';
      const NAV_ITEMS = [
        { id: 'dashboard', label: 'Dashboard', short: 'Home', icon: 'home' },
        { id: 'source', label: 'Source Candidates', short: 'Source', icon: 'search' },
        { id: 'inbound', label: 'Inbound Screening', short: 'Inbound', icon: 'inbox' },
        { id: 'candidates', label: 'Candidates', short: 'Candidates', icon: 'users' },
        { id: 'outreach', label: 'Outreach', short: 'More', icon: 'mail' }
      ];
      const SOURCE_CANDIDATES = [
        { name: 'Sarah Mitchell', role: 'Senior Recruitment Consultant', company: 'Hays', location: 'London, UK', exp: '5 yrs', score: 92, avatar: 'SM', color: '#1a6fff' },
        { name: 'James Okafor', role: 'Principal Consultant', company: 'Michael Page', location: 'London, UK', exp: '7 yrs', score: 88, avatar: 'JO', color: '#00c9a7' },
        { name: 'Priya Sharma', role: 'Senior Talent Partner', company: 'Robert Half', location: 'London, UK', exp: '4 yrs', score: 85, avatar: 'PS', color: '#ffb547' },
        { name: 'Tom Lawson', role: 'Recruitment Manager', company: 'Reed Specialist', location: 'City of London', exp: '6 yrs', score: 83, avatar: 'TL', color: '#9c27b0' },
        { name: 'Charlotte Hayes', role: 'Senior Consultant', company: 'Search Consultancy', location: 'London, UK', exp: '5 yrs', score: 81, avatar: 'CH', color: '#ff4757' },
        { name: 'Dmitri Volkov', role: 'Business Dev Consultant', company: 'Spencer Ogden', location: 'London, UK', exp: '4 yrs', score: 79, avatar: 'DV', color: '#00bcd4' },
        { name: 'Amara Diallo', role: 'Senior Recruiter', company: 'Investigo', location: 'London, UK', exp: '3 yrs', score: 76, avatar: 'AD', color: '#e91e63' },
        { name: 'Oliver Park', role: 'Senior Associate', company: 'Korn Ferry', location: 'London, UK', exp: '6 yrs', score: 74, avatar: 'OP', color: '#4caf50' },
        { name: 'Fatima Al-Rashid', role: 'Talent Acquisition Lead', company: 'Adecco', location: 'London, UK', exp: '5 yrs', score: 71, avatar: 'FA', color: '#ff9800' },
        { name: 'Ben Whitfield', role: 'Recruitment Consultant', company: 'Adzuna', location: 'London, UK', exp: '3 yrs', score: 68, avatar: 'BW', color: '#607d8b' },
        { name: 'Lena Fischer', role: 'Senior Talent Partner', company: 'Eames Consulting', location: 'London, UK', exp: '8 yrs', score: 66, avatar: 'LF', color: '#795548' },
        { name: 'Marcus Webb', role: 'Senior Consultant', company: 'Talent Works', location: 'London, UK', exp: '4 yrs', score: 63, avatar: 'MW', color: '#673ab7' }
      ];
      const INBOUND_CANDIDATES = [
        { name: 'Nadia Khan', role: 'Senior Recruitment Consultant', company: 'Direct Applicant', location: 'London, UK', exp: '6 yrs', score: 91, avatar: 'NK', color: '#1a6fff' },
        { name: 'Alex Morgan', role: 'Business Development Manager', company: 'Direct Applicant', location: 'Manchester, UK', exp: '5 yrs', score: 86, avatar: 'AM', color: '#00c9a7' },
        { name: 'Sofia Bennett', role: 'Talent Partner', company: 'Direct Applicant', location: 'Remote', exp: '7 yrs', score: 82, avatar: 'SB', color: '#ffb547' }
      ];
      const OUTREACH_MESSAGES = [
        { name: 'Sarah Mitchell', via: 'LinkedIn DM', status: 'Draft', text: "Hi Sarah - I came across your profile and your commercial billing track record stood out straight away. We're building a desk where someone with your BD confidence and tenure could make a serious mark. Worth a quick 10 mins?" },
        { name: 'James Okafor', via: 'LinkedIn DM', status: 'Draft', text: "Hi James - your progression into principal-level delivery and client ownership looks exactly the kind of path we'd want to speak to. There's a role here with real room to build. Open to a short intro?" },
        { name: 'Priya Sharma', via: 'Email', status: 'Draft', text: "Hi Priya - your background in senior talent partnering and desk growth caught my eye. We’re working on a brief that needs someone commercially switched-on and credible with clients. Happy to share context if useful." },
        { name: 'Tom Lawson', via: 'LinkedIn DM', status: 'Draft', text: "Hi Tom - noticed your mix of management and personal billing experience. The role we're hiring for needs someone who can lead from the front rather than just supervise. Worth a quick conversation?" },
        { name: 'Charlotte Hayes', via: 'Email', status: 'Draft', text: "Hi Charlotte - your tenure and market exposure stood out. This is a senior consultant role with genuine headroom, not a sideways move. If you're open, I can send over a sharper outline." },
        { name: 'Dmitri Volkov', via: 'LinkedIn DM', status: 'Draft', text: "Hi Dmitri - your business development profile looked strong and aligned with a commercial hiring brief we're running. Feels like the sort of move where your BD instincts would matter from day one." },
        { name: 'Amara Diallo', via: 'Email', status: 'Draft', text: "Hi Amara - I liked the consistency in your progression and client-facing delivery. We’re speaking to a firm that would value that trajectory. Happy to compare notes if timing is right." },
        { name: 'Oliver Park', via: 'LinkedIn DM', status: 'Draft', text: "Hi Oliver - your track record in senior associate recruitment looks highly relevant to a search we're running in London. There’s a lot of autonomy in the seat. Open to hearing more?" }
      ];
      const STATIC_ACTIVITY = [
        '07:12 - 4 candidates shortlisted for Senior Recruitment Consultant.',
        '06:48 - 2 interviews scheduled from inbound applicants.',
        '05:31 - Outreach drafts generated for 8 matched candidates.',
        '04:54 - 43 inbound applications screened across 3 postings.',
        '03:17 - LinkedIn sourcing run enriched with verified contact data.'
      ];
      const FILTERS = ['All', 'Shortlisted', 'Contacted', 'Replied', 'Interview'];
      const CANDIDATE_DIRECTORY = [
        ...SOURCE_CANDIDATES.slice(0, 12).map((candidate, index) => ({
          ...candidate,
          origin: 'Sourced from LinkedIn',
          status: index < 4 ? 'Shortlisted' : index < 8 ? 'Outreach Sent' : index < 10 ? 'Replied' : 'Interview Booked'
        })),
        ...INBOUND_CANDIDATES.map((candidate, index) => ({
          ...candidate,
          origin: 'Applied',
          status: index === 0 ? 'Interview Booked' : index === 1 ? 'Replied' : 'Shortlisted'
        }))
      ];

      const state = {
        firmName: getFirmName(),
        slug: getSlug(),
        currentPage: getInitialPage(),
        drawerOpen: false,
        sourceRun: createRunState('source'),
        inboundRun: createRunState('inbound'),
        candidatesFilter: 'All',
        candidatesQuery: '',
        overlayShown: readOverlayState(),
        editingMessage: null,
        sessionId: sessionStorage.getItem(SESSION_TRACK_KEY) || createSessionId(),
        events: []
      };

      const pageEls = Object.fromEntries(Array.from(document.querySelectorAll('.page-view')).map((node) => [node.dataset.page, node]));
      const desktopNav = document.getElementById('desktop-nav');
      const mobileNav = document.getElementById('mobile-nav');
      const bottomNav = document.getElementById('bottom-nav');
      const drawer = document.getElementById('mobile-drawer');
      const overlayRoot = document.getElementById('overlay-root');
      const toastRoot = document.getElementById('toast-root');
      const watermark = document.getElementById('watermark');
      const menuToggle = document.getElementById('menu-toggle');
      const drawerClose = document.getElementById('drawer-close');
      const drawerBackdrop = document.getElementById('drawer-backdrop');
      const mobileBookShortcut = document.getElementById('mobile-book-shortcut');

      sessionStorage.setItem(SESSION_TRACK_KEY, state.sessionId);
      applyFirmName();
      renderNavigation();
      renderAllPages();
      bindGlobalEvents();
      navigate(state.currentPage, { replace: true, skipRender: false });
      track('PAGE_VIEW', state.currentPage);

      function createRunState(mode) {
        return {
          mode,
          launched: false,
          phase: 'idle',
          startedAt: null,
          foundCount: 0,
          visibleCandidates: 0,
          progress: { fit: 0, tenure: 0, communication: 0 },
          timers: []
        };
      }

      function getSlug() {
        return window.location.pathname.replace(/^\/+|\/+$/g, '') || 'your-agency';
      }

      function getFirmName() {
        const slug = decodeURIComponent(window.location.pathname.replace(/^\/+|\/+$/g, '')).replace(/-/g, ' ');
        if (!slug) return 'Your Agency';
        const words = slug
          .replace(/([a-z])([A-Z])/g, '$1 $2')
          .split(/\s+/)
          .filter(Boolean)
          .map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase());
        return words.join(' ') || 'Your Agency';
      }

      function getInitialPage() {
        const url = new URL(window.location.href);
        const requested = url.searchParams.get('view') || sessionStorage.getItem(PAGE_STORAGE_KEY) || 'dashboard';
        return NAV_ITEMS.some((item) => item.id === requested) ? requested : 'dashboard';
      }

      function readOverlayState() {
        try {
          return JSON.parse(sessionStorage.getItem(OVERLAY_STORAGE_KEY) || '{}');
        } catch (error) {
          return {};
        }
      }

      function saveOverlayState() {
        sessionStorage.setItem(OVERLAY_STORAGE_KEY, JSON.stringify(state.overlayShown));
      }

      function createSessionId() {
        return window.crypto && window.crypto.randomUUID ? window.crypto.randomUUID() : 'session-' + Date.now();
      }

      function applyFirmName() {
        document.querySelectorAll('[data-firm-name]').forEach((node) => {
          node.textContent = state.firmName;
        });
        watermark.textContent = 'RAXION DEMO • tryraxion.com/' + state.slug + ' • Not connected to live data';
        menuToggle.innerHTML = icon('menu');
        drawerClose.innerHTML = icon('close');
        mobileBookShortcut.innerHTML = icon('calendar');
      }

      function renderNavigation() {
        desktopNav.innerHTML = NAV_ITEMS.map((item) => renderNavButton(item, 'desktop')).join('');
        mobileNav.innerHTML = NAV_ITEMS.map((item) => renderNavButton(item, 'mobile')).join('');
        bottomNav.innerHTML = NAV_ITEMS.slice(0, 4).map((item) => `
          <button class="bottom-nav-item ${state.currentPage === item.id ? 'active' : ''}" type="button" data-nav="${item.id}">
            ${icon(item.icon)}
            <span>${item.short}</span>
          </button>
        `).join('');
      }

      function renderNavButton(item, variant) {
        return `
          <button class="nav-link ${state.currentPage === item.id ? 'active' : ''}" type="button" data-nav="${item.id}" data-variant="${variant}">
            ${icon(item.icon)}
            <span>${item.label}</span>
          </button>
        `;
      }

      function renderAllPages() {
        pageEls.dashboard.innerHTML = renderDashboard();
        pageEls.source.innerHTML = renderSourcePage();
        pageEls.inbound.innerHTML = renderInboundPage();
        pageEls.candidates.innerHTML = renderCandidatesPage();
        pageEls.outreach.innerHTML = renderOutreachPage();
        updateVisiblePage();
      }

      function updateVisiblePage() {
        Object.entries(pageEls).forEach(([page, node]) => {
          node.classList.toggle('active', state.currentPage === page);
        });
      }

      function renderDashboard() {
        return `
          <div class="stack">
            <div class="hero-card page-hero stagger-1">
              <div class="eyebrow">Demo Dashboard</div>
              <h2>Good morning, ${escapeHtml(state.firmName)}.</h2>
              <p>Raxion has been running for 14 hours, prioritising sourced candidates, screening inbound applicants, and keeping first interviews moving without waiting on the desk.</p>
              <div class="desktop-actions">
                <button class="button-primary" type="button" data-go-launch="source">Launch New Job</button>
                <button class="button-secondary" type="button" data-go-launch="inbound">Screen Inbound</button>
              </div>
            </div>

            <div class="stats-grid stagger-2">
              ${renderStatCard('27', 'Candidates sourced today')}
              ${renderStatCard('43', 'Applications screened')}
              ${renderStatCard('19', 'Outreach drafted')}
              ${renderStatCard('6', 'Interviews scheduled')}
            </div>

            <div class="section-card stagger-3">
              <div class="section-head">
                <div>
                  <h3 class="section-title">Activity Feed Preview</h3>
                  <p class="section-copy">Recent system activity inside the demo environment.</p>
                </div>
                <button class="inline-button" type="button" data-nav-inline="source">View all</button>
              </div>

      function renderFeedState(runState, mode) {
        const candidates = mode === 'source' ? SOURCE_CANDIDATES : SOURCE_CANDIDATES.slice(0, 8).map((candidate, index) => ({
          ...candidate,
          company: 'Applied',
          sourceLabel: 'Applied',
          score: candidate.score - (index % 3) * 2
        }));

        if (!runState.launched || runState.phase === 'idle') {
          return `
            <div class="empty-state">
              <div class="empty-radar"></div>
              ${icon('radar')}
              <div>Raxion is standing by. Launch a ${mode === 'source' ? 'job brief' : 'screening run'} above to begin.</div>
            </div>
          `;
        }

        if (runState.phase === 'scanning') {
          return `
            <div class="scan-state">
              <div class="scan-line"></div>
              <div class="status-line"><span class="status-dot"></span>${mode === 'source' ? 'Scanning LinkedIn for Senior Recruitment Consultants in London...' : 'Scanning 47 application CVs for Senior Recruitment Consultant...'}</div>
              <div class="status-line">Candidates found: ${runState.foundCount}</div>
              <div class="status-line">${mode === 'source' ? 'Applying filters...' : 'Scoring against Senior Recruitment Consultant criteria...'}</div>
            </div>
          `;
        }

        if (runState.phase === 'scoring') {
          return `
            <div class="scan-state">
              <div class="status-line"><span class="status-dot"></span>${mode === 'source' ? 'Scoring top matches against the brief...' : 'Ranking inbound applicants by fit...'}</div>
              <div class="progress-list">
                ${[
                  ['Fit against brief', runState.progress.fit],
                  ['Tenure signal strength', runState.progress.tenure],
                  ['Communication style', runState.progress.communication]
                ].map((row) => `
                  <div class="progress-row">
                    <div class="progress-top"><span>${row[0]}</span><span>${row[1]}%</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="--target-width:${row[1]}%;"></div></div>
                  </div>
                `).join('')}
              </div>
              <div class="status-line">Running CV analysis...</div>
              <div class="status-line">Checking tenure signals...</div>
              <div class="status-line">Scoring communication style from profile...</div>
            </div>
          `;
        }

        const visible = candidates.slice(0, runState.visibleCandidates);
        return `
          <div class="candidate-feed">
            ${visible.map((candidate, index) => renderLiveCandidateCard(candidate, mode, index)).join('')}
            ${runState.visibleCandidates >= candidates.length ? renderSummaryBar(mode) : ''}
          </div>
        `;
      }

      function renderLiveCandidateCard(candidate, mode, index) {
        const sourceLabel = mode === 'source' ? 'Sourced from LinkedIn' : 'Applied';
        return `
          <div class="candidate-card" style="animation-delay:${Math.min(index * 80, 420)}ms;">
            <div class="candidate-top">
              <div class="avatar" style="background:${candidate.color};">${escapeHtml(candidate.avatar)}</div>
              <div class="candidate-meta">
                <h4>${escapeHtml(candidate.name)}</h4>
                <p>${escapeHtml(candidate.role)} @ ${escapeHtml(candidate.company)}</p>
                <div class="candidate-sub">${escapeHtml(candidate.location)} • ${escapeHtml(candidate.exp)} • ${sourceLabel}</div>
              </div>
            </div>
            <div class="score-block">
              <div class="score-label">
                <span>Match score</span>
                <span>${candidate.score}%</span>
              </div>
              <div class="score-track">
                <div class="score-fill" style="--target-width:${candidate.score}%;"></div>
              </div>
            </div>
            <div class="candidate-actions">
              <button class="action-link" type="button" data-view-candidate="${escapeHtml(candidate.name)}">${icon('profile')}View Profile</button>
              <button class="action-link" type="button" data-nav-inline="outreach">${icon('mail')}See Draft Outreach</button>
              ${mode === 'inbound' ? `<button class="action-link" type="button" data-schedule-interview="${escapeHtml(candidate.name)}">${icon('calendar')}Schedule Interview</button>` : ''}
            </div>

      function renderSummaryBar(mode) {
        return `
          <div class="summary-bar">
            <div class="section-title">${mode === 'source' ? 'Raxion found 247 candidates. 12 shortlisted. 8 outreach messages drafted.' : 'Raxion screened 47 applicants. 8 shortlisted. 4 interviews queued.'}</div>
            <div class="summary-grid">
              <div class="summary-card">
                <div class="summary-value">14 hours</div>
                <div class="summary-copy">Estimated recruiter time</div>

              <div class="summary-card">

              <div class="summary-card">

                <div class="summary-copy">Shortlisted candidates</div>
              </div>
              <div class="summary-card">
                <div class="summary-value">${mode === 'source' ? '8' : '4'}</div>
                <div class="summary-copy">${mode === 'source' ? 'Drafted outreach messages' : 'Interview actions queued'}</div>
              </div>
            </div>

              <button class="button-primary" type="button" data-nav-inline="outreach">See Outreach Drafts →</button>

      function renderCandidateDirectoryCard(candidate) {
        return `
          <div class="candidate-card">
            <div class="candidate-line">
              <div class="avatar" style="background:${candidate.color};">${escapeHtml(candidate.avatar)}</div>
              <div class="candidate-line-main">
                <h4>${escapeHtml(candidate.name)}</h4>
                <p>${escapeHtml(candidate.role)} @ ${escapeHtml(candidate.company)}</p>

      }

      function renderStatusBadge(status) {
        const cls = status === 'Shortlisted'
          ? 'status-shortlisted'
          : status === 'Outreach Sent'
            ? 'status-outreach'
            : status === 'Replied'
              ? 'status-replied'
              : 'status-interview';
        return `<span class="status-badge ${cls}">${escapeHtml(status)}</span>`;
      }

      function renderField(label, options, selected) {
        return `
          <div class="field">
            <label>${escapeHtml(label)}</label>
            <select>
              ${options.map((option) => `<option ${option === selected ? 'selected' : ''}>${escapeHtml(option)}</option>`).join('')}
            </select>
          </div>
        `;
      }

      function renderStatCard(value, label) {
        return `
          <div class="stat-card">
            <div class="stat-value">${value}</div>
            <div class="stat-label">${label}</div>
          </div>
        `;
      }

      function getFilteredCandidates() {
        return CANDIDATE_DIRECTORY.filter((candidate) => {
          const matchesFilter = state.candidatesFilter === 'All' || candidate.status === normalizeFilterToStatus(state.candidatesFilter);
          const haystack = [candidate.name, candidate.role, candidate.company, candidate.origin].join(' ').toLowerCase();
          const matchesQuery = !state.candidatesQuery || haystack.includes(state.candidatesQuery.toLowerCase());
          return matchesFilter && matchesQuery;
        });
      }

      function normalizeFilterToStatus(filter) {
        if (filter === 'Contacted') return 'Outreach Sent';
        if (filter === 'Interview') return 'Interview Booked';
        return filter;
      }

      function bindGlobalEvents() {
        document.body.addEventListener('click', handleBodyClick);
        document.body.addEventListener('input', handleBodyInput);
        menuToggle.addEventListener('click', () => setDrawer(true));
        drawerClose.addEventListener('click', () => setDrawer(false));
        drawerBackdrop.addEventListener('click', () => setDrawer(false));
        mobileBookShortcut.addEventListener('click', () => openBooking('mobile-shortcut'));
        window.addEventListener('popstate', handlePopState);
        window.addEventListener('beforeunload', handleBeforeUnload);
        window.addEventListener('pagehide', flushTracking);
      }

      function handleBodyClick(event) {
        const bookLink = event.target.closest('[data-book-call]');
        if (bookLink) {
          track('BOOK_CALL_CLICKED', bookLink.dataset.bookSource || 'unknown');
          return;
        }

        const navButton = event.target.closest('[data-nav], [data-nav-inline]');
        if (navButton) {
          const page = navButton.dataset.nav || navButton.dataset.navInline;
          navigate(page);
          setDrawer(false);
          return;
        }

        const launchButton = event.target.closest('[data-launch], [data-go-launch]');
        if (launchButton) {
          const mode = launchButton.dataset.launch || launchButton.dataset.goLaunch;
          navigate(mode === 'source' ? 'source' : 'inbound');
          window.setTimeout(() => startRun(mode), launchButton.dataset.goLaunch ? 120 : 0);
          return;
        }

        const filterButton = event.target.closest('[data-filter]');
        if (filterButton) {
          state.candidatesFilter = filterButton.dataset.filter;
          renderAllPages();
          renderNavigation();
          return;
        }

        const editButton = event.target.closest('[data-edit-message]');
        if (editButton) {
          state.editingMessage = Number(editButton.dataset.editMessage);
          renderAllPages();
          focusEditableMessage(state.editingMessage);
          return;
        }

        const saveButton = event.target.closest('[data-save-message]');
        if (saveButton) {
          state.editingMessage = null;
          toast('Draft saved inside the demo view.');
          renderAllPages();
          return;
        }

        const sendButton = event.target.closest('[data-send-message]');
        if (sendButton) {
          toast('In the live system, Raxion sends this automatically. Book a call to see it in action.');
          maybeShowOverlay('send');
          track('SEND_OUTREACH_CLICKED', sendButton.dataset.sendMessage);
          return;
        }

        const scheduleButton = event.target.closest('[data-schedule-interview]');
        if (scheduleButton) {
          toast('Interview scheduling is automated in the live product.');
          maybeShowOverlay('schedule');
          track('SCHEDULE_INTERVIEW_CLICKED', scheduleButton.dataset.scheduleInterview);
          return;
        }

        const viewButton = event.target.closest('[data-view-candidate]');
        if (viewButton) {
          toast('Candidate profile opened in the live product. This demo keeps you in the dashboard.');
          return;
        }

        const overlayDismiss = event.target.closest('[data-overlay-dismiss]');
        if (overlayDismiss) {
          closeOverlay();
          return;
        }
      }

      function handleBodyInput(event) {
        const search = event.target.closest('[data-candidate-search]');
        if (search) {
          state.candidatesQuery = search.value;
          renderAllPages();
          return;
        }

        const message = event.target.closest('[data-message-body]');
        if (message) {
          const index = Number(message.dataset.messageBody);
          OUTREACH_MESSAGES[index].text = message.textContent.trim();
        }
      }

      function handlePopState(event) {
        const page = event.state && event.state.page ? event.state.page : getInitialPage();
        state.currentPage = NAV_ITEMS.some((item) => item.id === page) ? page : 'dashboard';
        sessionStorage.setItem(PAGE_STORAGE_KEY, state.currentPage);
        renderNavigation();
        updateVisiblePage();
        track('PAGE_VIEW', state.currentPage);
      }

      function handleBeforeUnload(event) {
        if (isRunActive()) {
          event.preventDefault();
          event.returnValue = 'Raxion is still sourcing candidates. Leave anyway?';
          return event.returnValue;
        }
      }

      function navigate(page, options = {}) {
        state.currentPage = page;
        sessionStorage.setItem(PAGE_STORAGE_KEY, page);
        renderNavigation();
        renderAllPages();
        if (!options.skipRender) updateVisiblePage();
        const url = new URL(window.location.href);
        if (page === 'dashboard') {
          url.searchParams.delete('view');
        } else {
          url.searchParams.set('view', page);
        }
        const historyMethod = options.replace ? 'replaceState' : 'pushState';
        window.history[historyMethod]({ page }, '', url.pathname + url.search);
        track('PAGE_VIEW', page);
      }

      function setDrawer(open) {
        state.drawerOpen = open;
        drawer.classList.toggle('open', open);
        document.body.classList.toggle('drawer-open', open);
      }

      function startRun(mode) {
        const runState = mode === 'source' ? state.sourceRun : state.inboundRun;
        clearRunTimers(runState);
        runState.launched = true;
        runState.phase = 'scanning';
        runState.startedAt = Date.now();
        runState.foundCount = 0;
        runState.visibleCandidates = 0;
        runState.progress = { fit: 0, tenure: 0, communication: 0 };
        renderAllPages();
        track('RUN_STARTED', mode);

        const maxFound = mode === 'source' ? 247 : 47;
        const scanInterval = setInterval(() => {
          runState.foundCount = Math.min(maxFound, runState.foundCount + (mode === 'source' ? 17 : 5));
          renderFeedOnly(mode);
        }, 240);
        runState.timers.push(scanInterval);

        runState.timers.push(setTimeout(() => {
          clearInterval(scanInterval);
          runState.foundCount = maxFound;
          runState.phase = 'scoring';
          renderFeedOnly(mode);
        }, 3000));

        runState.timers.push(setTimeout(() => {
          animateProgress(runState, mode);
        }, 3200));

        runState.timers.push(setTimeout(() => {
          runState.phase = 'results';
          renderFeedOnly(mode);
          beginCandidateReveal(runState, mode);
        }, 8000));
      }

      function animateProgress(runState, mode) {
        const steps = [
          { fit: 68, tenure: 0, communication: 0 },
          { fit: 68, tenure: 84, communication: 0 },
          { fit: 68, tenure: 84, communication: 91 }
        ];
        steps.forEach((progress, index) => {
          runState.timers.push(setTimeout(() => {
            runState.progress = progress;
            renderFeedOnly(mode);
          }, index * 1100));
        });
      }

      function beginCandidateReveal(runState, mode) {
        const total = mode === 'source' ? SOURCE_CANDIDATES.length : 8;
        const interval = setInterval(() => {
          runState.visibleCandidates = Math.min(total, runState.visibleCandidates + 1);
          renderFeedOnly(mode);
          if (runState.visibleCandidates >= total) {
            clearInterval(interval);
            maybeShowOverlay(mode === 'source' ? 'launch-source' : 'launch-inbound');
            track('RUN_COMPLETED', mode);
          }
        }, 1200);
        runState.timers.push(interval);
      }

      function renderFeedOnly(mode) {
        const target = document.getElementById(mode + '-feed');
        if (target) {
          target.innerHTML = renderFeedState(mode === 'source' ? state.sourceRun : state.inboundRun, mode);
        }
      }

      function clearRunTimers(runState) {
        runState.timers.forEach((timer) => {
          clearTimeout(timer);
          clearInterval(timer);
        });
        runState.timers = [];
      }

      function isRunActive() {
        return [state.sourceRun, state.inboundRun].some((runState) => {
          if (!runState.launched || runState.phase === 'idle') return false;
          const total = runState.mode === 'source' ? SOURCE_CANDIDATES.length : 8;
          return runState.phase !== 'results' || runState.visibleCandidates < total;
        });
      }

      function maybeShowOverlay(type) {
        if (state.overlayShown[type]) return;
        state.overlayShown[type] = true;
        saveOverlayState();
        const title = 'In the live system, this would already be running for your firm.';
        const copy = type === 'send'
          ? 'Raxion drafts and sends candidate outreach automatically once guardrails are approved.'
          : type === 'schedule'
            ? 'Raxion can push scheduling actions into your workflow without the recruiter handling admin.'
            : 'This demo is simulating the result. The live product runs the workflow against your briefs and candidate flow.';
        overlayRoot.innerHTML = `
          <div class="overlay-shell">
            <div class="overlay-panel">
              <h3>${escapeHtml(title)}</h3>
              <p>${escapeHtml(copy)}</p>
              <div class="overlay-actions">
                <a class="overlay-book" href="${BOOKING_URL}" target="_blank" rel="noopener" data-book-call data-book-source="overlay">Book a 20-minute call →</a>
                <button class="overlay-dismiss" type="button" data-overlay-dismiss>Got it, keep browsing</button>
              </div>
            </div>
          </div>
        `;
        document.body.classList.add('modal-open');
      }

      function closeOverlay() {
        overlayRoot.innerHTML = '';
        document.body.classList.remove('modal-open');
      }

      function toast(message) {
        const node = document.createElement('div');
        node.className = 'toast';
        node.textContent = message;
        toastRoot.appendChild(node);
        window.setTimeout(() => node.remove(), 3200);
      }

      function openBooking(source) {
        track('BOOK_CALL_CLICKED', source);
        window.open(BOOKING_URL, '_blank', 'noopener');
      }

      function track(type, detail) {
        state.events.push({ type, detail, at: new Date().toISOString() });
      }

      function flushTracking() {
        if (!state.events.length || !navigator.sendBeacon) return;
        const payload = JSON.stringify({
          id: state.sessionId,
          slug: state.slug,
          startedAt: new Date().toISOString(),
          totalDuration: Math.round(performance.now() / 1000),
          events: state.events
        });
        try {
          navigator.sendBeacon('/api/track', payload);
          state.events = [];
        } catch (error) {
          /* ignore */
        }
      }

      function focusEditableMessage(index) {
        window.requestAnimationFrame(() => {
          const node = document.querySelector('[data-message-body="' + index + '"]');
          if (!node) return;
          node.focus();
          const range = document.createRange();
          range.selectNodeContents(node);
          range.collapse(false);
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function icon(name) {
        const icons = {
          home: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5 9.5V21h14V9.5"></path></svg>',
          search: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6"></circle><path d="m20 20-4.2-4.2"></path></svg>',
          inbox: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v12H15l-3 4-3-4H4z"></path></svg>',
          users: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>',
          mail: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4z"></path><path d="m4 7 8 6 8-6"></path></svg>',
          menu: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg>',
          close: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12"></path><path d="M18 6 6 18"></path></svg>',
          calendar: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2v4"></path><path d="M17 2v4"></path><rect x="3" y="5" width="18" height="16" rx="2"></rect><path d="M3 10h18"></path></svg>',
          profile: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path><path d="M20 21a8 8 0 1 0-16 0"></path></svg>',
          radar: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12 21 3"></path><path d="M3 12a9 9 0 1 0 9-9"></path><path d="M7 12a5 5 0 1 0 5-5"></path></svg>'
        };
        return icons[name] || icons.home;
      }
    })();
  </script>
</body>
</html>
